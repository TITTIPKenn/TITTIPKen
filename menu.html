<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu Coffee</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2 id="user"></h2>
<p id="store"></p>

<input id="search" placeholder="Cari menu..." oninput="renderMenu()" />

<div id="menu" class="menu"></div>

<!-- POPUP -->
<div id="popup" class="popup hidden">
  <div class="box">

    <h2 id="name"></h2>
    <p id="price"></p>

    <div id="options">
      <p>Type</p>
      <button id="btnICE" onclick="setType('ICE')">ICE</button>
      <button id="btnHOT" onclick="setType('HOT')">HOT</button>

      <p>Size</p>
      <button id="btnR" onclick="setSize('R')">R</button>
      <button id="btnL" onclick="setSize('L')">L</button>

      <p>Sugar</p>
      <button id="btnNormal" onclick="setSugar('Normal')">Normal</button>
      <button id="btnLess" onclick="setSugar('Less')">Less</button>
    </div>

    <button onclick="addToCart()">➕ Tambah ke Keranjang</button>

    <hr>

    <h3>🛒 Keranjang</h3>
    <div id="cart"></div>

    <p>Total: Rp <span id="total">0</span></p>

    <button onclick="checkout()">Checkout WhatsApp</button>
    <button onclick="closeMenu()">Tutup</button>

  </div>
</div>

<script src="script.js"></script>

<script>
document.getElementById("user").innerText =
  "Halo, " + localStorage.getItem("nama");

document.getElementById("store").innerText =
  "📍 " + localStorage.getItem("lokasi");
</script>

</body>
</html>
