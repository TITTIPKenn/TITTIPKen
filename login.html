<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Order</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="home">

  <h1>☕ Isi Data Dulu</h1>

  <input id="nama" placeholder="Nama kamu">
  <input id="lokasi" placeholder="Lokasi / Cabang">

  <button onclick="startOrder()">
    🚀 LANJUT KE MENU
  </button>

</div>

<script>
function startOrder() {

  let nama = document.getElementById("nama").value.trim();
  let lokasi = document.getElementById("lokasi").value.trim();

  if (!nama || !lokasi) {
    alert("Isi nama & lokasi dulu ya!");
    return;
  }

  // simpan data
  localStorage.setItem("nama", nama);
  localStorage.setItem("lokasi", lokasi);

  // IMPORTANT: pindah halaman
  window.location.href = "menu.html";
}

// 🔥 ANTI AUTO RUN BUG (INI PENTING BANGET)
document.addEventListener("DOMContentLoaded", function () {
  console.log("Login page ready");
});
</script>

</body>
</html>
