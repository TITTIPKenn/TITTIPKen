<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TITTIPKenangan</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="home">
  <h1>☕ TITTIPKen</h1>

  <input id="nama" placeholder="Nama kamu">
  <input id="lokasi" placeholder="Lokasi Kopi Kenangan Kamu">

  <button onclick="start()">Masuk Menu</button>
</div>

<script>
function start() {
  let nama = document.getElementById("nama").value;
  let lokasi = document.getElementById("lokasi").value;

  if (!nama || !lokasi) {
    alert("Isi nama & lokasi dulu!");
    return;
  }

  localStorage.setItem("nama", nama);
  localStorage.setItem("lokasi", lokasi);

  window.location.href = "menu.html";
}
</script>

</body>
</html>
