<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu Coffee Shop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>☕ Menu Coffee Shop</h1>

<input id="search" placeholder="Cari menu..." oninput="renderMenu()" />

<div id="menu" class="menu"></div>

<!-- POPUP -->
<div id="popup" class="popup hidden">
  <div class="box">
    <h2 id="name"></h2>
    <p id="price"></p>

    <button onclick="setType('ICE')">ICE</button>
    <button onclick="setType('HOT')">HOT</button>

    <button onclick="setSize('R')">REGULAR</button>
    <button onclick="setSize('L')">LARGE</button>

    <br><br>

    <button onclick="order()">📲 Pesan WhatsApp</button>
    <button onclick="closeMenu()">Tutup</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
