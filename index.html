<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu TITTIPKen</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>☕ Menu Coffee Shop</h1>

<input id="search" placeholder="Cari menu..." oninput="renderMenu()" />

<div id="menu" class="menu"></div>

<!-- POPUP -->
<div id="popup" class="popup hidden">
  <div class="box">

    <h2 id="name"></h2>
    <p id="price"></p>

    <div class="section">
      <p>Type:</p>
      <button id="btnICE" onclick="setType('ICE')">ICE</button>
      <button id="btnHOT" onclick="setType('HOT')">HOT</button>
    </div>

    <div class="section">
      <p>Size:</p>
      <button id="btnR" onclick="setSize('R')">REGULAR</button>
      <button id="btnL" onclick="setSize('L')">LARGE</button>
    </div>

    <br>

    <button onclick="order()">📲 Pesan WhatsApp</button>
    <button onclick="closeMenu()">Tutup</button>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
