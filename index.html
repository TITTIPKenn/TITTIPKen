<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu Coffee Shop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>☕ Menu Coffee Shop</h1>

<div class="menu">

  <div class="card" onclick="openMenu('Latte', 15500)">
    <h3>Butterscotch Latte</h3>
    <p>Rp15.500</p>
  </div>

  <div class="card" onclick="openMenu('Mocha', 17000)">
    <h3>Chocolate Mocha</h3>
    <p>Rp17.000</p>
  </div>

</div>

<!-- DETAIL -->
<div id="popup" class="popup hidden">
  <div class="box">
    <h2 id="name"></h2>
    <p id="price"></p>

    <button onclick="setType('ICE')">ICE</button>
    <button onclick="setType('HOT')">HOT</button>

    <button onclick="setSize('REGULAR')">REGULAR</button>
    <button onclick="setSize('LARGE')">LARGE</button>

    <br><br>

    <button onclick="order()">📲 Pesan WhatsApp</button>
    <button onclick="closeMenu()">Tutup</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
